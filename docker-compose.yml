services:
  eureka-server:
    build:
      context: ./eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8761/actuator/health',(r)=>{let d='';r.on('data',c=>d+=c);r.on('end',()=>{try{process.exit(JSON.parse(d).status==='UP'?0:1)}catch{process.exit(1)}})}).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-customer_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-customer_pwd}
      POSTGRES_DB: ${POSTGRES_DB:-customers}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-customer_app} -d ${POSTGRES_DB:-customers}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  auth-service:
    build:
      context: ./auth-service
    container_name: auth-service
    ports:
      - "${AUTH_SERVICE_PORT:-8085}:8085"
    environment:
      EUREKA_HOST: eureka-server
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-customer_app}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-customer_pwd}
      DB_NAME: ${POSTGRES_DB:-customers}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret}
    networks:
      - ecommerce-net
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8085/actuator/health',(r)=>{let d='';r.on('data',c=>d+=c);r.on('end',()=>{try{process.exit(JSON.parse(d).status==='UP'?0:1)}catch{process.exit(1)}})}).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  customer-service:
    build:
      context: ./customer-service
    container_name: customer-service
    ports:
      - "${CUSTOMER_SERVICE_PORT:-8081}:8081"
    environment:
      EUREKA_HOST: eureka-server
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-customer_app}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-customer_pwd}
      DB_NAME: ${POSTGRES_DB:-customers}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret}
      SERVICE_JWT_SECRET: ${SERVICE_JWT_SECRET:-dev-service-jwt-secret}
    networks:
      - ecommerce-net
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8081/actuator/health',(r)=>{let d='';r.on('data',c=>d+=c);r.on('end',()=>{try{process.exit(JSON.parse(d).status==='UP'?0:1)}catch{process.exit(1)}})}).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  inventory-service:
    build:
      context: ./inventory-service
    container_name: inventory-service
    ports:
      - "${INVENTORY_SERVICE_PORT:-8082}:8082"
    environment:
      EUREKA_HOST: eureka-server
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret}
      SERVICE_JWT_SECRET: ${SERVICE_JWT_SECRET:-dev-service-jwt-secret}
    networks:
      - ecommerce-net
    depends_on:
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8082/actuator/health',(r)=>{let d='';r.on('data',c=>d+=c);r.on('end',()=>{try{process.exit(JSON.parse(d).status==='UP'?0:1)}catch{process.exit(1)}})}).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  order-service:
    build:
      context: ./order-service
    container_name: order-service
    ports:
      - "${ORDER_SERVICE_PORT:-8083}:8083"
    environment:
      CUSTOMER_SERVICE_URL: http://customer-service:8081
      INVENTORY_SERVICE_URL: http://inventory-service:8082
      EUREKA_HOST: eureka-server
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret}
      SERVICE_JWT_SECRET: ${SERVICE_JWT_SECRET:-dev-service-jwt-secret}
    networks:
      - ecommerce-net
    depends_on:
      customer-service:
        condition: service_healthy
      inventory-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8083/actuator/health',(r)=>{let d='';r.on('data',c=>d+=c);r.on('end',()=>{try{process.exit(JSON.parse(d).status==='UP'?0:1)}catch{process.exit(1)}})}).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  notifications-service:
    build:
      context: ./notifications-service
    container_name: notifications-service
    ports:
      - "${NOTIFICATIONS_SERVICE_PORT:-8084}:8084"
    environment:
      EUREKA_HOST: eureka-server
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret}
      SERVICE_JWT_SECRET: ${SERVICE_JWT_SECRET:-dev-service-jwt-secret}
    networks:
      - ecommerce-net
    depends_on:
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8084/actuator/health',(r)=>{let d='';r.on('data',c=>d+=c);r.on('end',()=>{try{process.exit(JSON.parse(d).status==='UP'?0:1)}catch{process.exit(1)}})}).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - ecommerce-net
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  api-gateway:
    build:
      context: ./api-gateway
    container_name: api-gateway
    ports:
      - "${API_GATEWAY_PORT:-8080}:8080"
    environment:
      AUTH_SERVICE_URL: http://auth-service:8085
      CUSTOMER_SERVICE_URL: http://customer-service:8081
      INVENTORY_SERVICE_URL: http://inventory-service:8082
      ORDER_SERVICE_URL: http://order-service:8083
      NOTIFICATIONS_SERVICE_URL: http://notifications-service:8084
      EUREKA_HOST: eureka-server
      REDIS_URL: redis://redis:6379
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret}
    networks:
      - ecommerce-net
    depends_on:
      auth-service:
        condition: service_healthy
      customer-service:
        condition: service_healthy
      inventory-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      notifications-service:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/actuator/health',(r)=>{let d='';r.on('data',c=>d+=c);r.on('end',()=>{try{process.exit(JSON.parse(d).status==='UP'?0:1)}catch{process.exit(1)}})}).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  demo-ui:
    build:
      context: ./demo-ui
    container_name: demo-ui
    ports:
      - "${DEMO_UI_PORT:-8090}:8090"
    environment:
      API_GATEWAY_URL: http://api-gateway:8080
    networks:
      - ecommerce-net
    depends_on:
      api-gateway:
        condition: service_healthy

networks:
  ecommerce-net:
    name: copilot-typescript-demo_ecommerce-net
    driver: bridge

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
