<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Incident Command Center</title>
  <style>
    :root {
      --bg: #0d1117; --surface: #161b22; --border: #30363d;
      --text: #e6edf3; --text-muted: #8b949e; --accent: #58a6ff;
      --sev1: #f85149; --sev4: #3fb950;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
    }

    .login-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 40px 36px; width: 380px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .logo-row {
      display: flex; align-items: center; justify-content: center;
      gap: 12px; margin-bottom: 28px;
    }
    .logo-icon { font-size: 2.2rem; }
    .logo-text h1 { font-size: 1.15rem; font-weight: 700; }
    .logo-text p { font-size: 0.78rem; color: var(--text-muted); margin-top: 2px; }

    .divider {
      height: 1px; background: var(--border); margin: 24px 0;
    }

    .signin-btn {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 12px 16px; border-radius: 8px;
      background: #238636; border: 1px solid rgba(240,246,252,0.1);
      color: white; font-size: 0.95rem; font-weight: 600;
      cursor: pointer; text-decoration: none; transition: background 0.15s;
    }
    .signin-btn:hover { background: #2ea043; }
    .signin-btn svg { flex-shrink: 0; }

    .not-configured {
      text-align: center; padding: 16px;
      background: rgba(248, 81, 73, 0.1); border: 1px solid var(--sev1);
      border-radius: 8px; font-size: 0.85rem;
    }
    .not-configured strong { color: var(--sev1); }
    .not-configured code {
      background: var(--bg); padding: 2px 6px; border-radius: 4px;
      font-size: 0.8rem; display: inline-block; margin: 2px 0;
    }

    .error-box {
      background: rgba(248, 81, 73, 0.1); border: 1px solid var(--sev1);
      border-radius: 8px; padding: 12px 14px; margin-bottom: 20px;
      font-size: 0.85rem; color: var(--sev1); display: none;
    }

    .info-list {
      font-size: 0.8rem; color: var(--text-muted); line-height: 1.8;
      margin-top: 20px;
    }
    .info-list li { list-style: none; padding-left: 20px; position: relative; }
    .info-list li::before { content: '✓'; position: absolute; left: 0; color: var(--sev4); }

    .footer {
      text-align: center; margin-top: 24px; font-size: 0.78rem;
      color: var(--text-muted);
    }
    .footer a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo-row">
      <span class="logo-icon">🚨</span>
      <div class="logo-text">
        <h1>Incident Command Center</h1>
        <p>TypeScript Microservices Monitoring</p>
      </div>
    </div>

    <div class="error-box" id="error-box"></div>

    <div id="auth-content">
      <!-- Filled by JS below -->
    </div>

    <ul class="info-list">
      <li>View and triage service incidents</li>
      <li>Real-time Prometheus metrics</li>
      <li>AI-powered diagnostics via GitHub Copilot</li>
      <li>Interactive runbook execution</li>
    </ul>

    <div class="footer">
      <a href="http://localhost:9090" target="_blank">Prometheus</a> ·
      <a href="http://localhost:3000" target="_blank">Grafana</a> ·
      <a href="http://localhost:9999" target="_blank">Logs</a>
    </div>
  </div>

  <script>
    // Show error from URL params
    const params = new URLSearchParams(location.search);
    const err = params.get('error');
    if (err) {
      const errorMessages = {
        oauth_not_configured: 'GitHub OAuth is not configured. Set GITHUB_CLIENT_ID and GITHUB_CLIENT_SECRET.',
        invalid_state: 'Security check failed. Please try again.',
        token_exchange_failed: 'GitHub token exchange failed. Check your OAuth app credentials.',
        user_fetch_failed: 'Could not fetch your GitHub profile. Please try again.',
        access_denied: 'Access was denied. Please authorise the app on GitHub.',
        server_error: 'A server error occurred. Check the container logs.',
      };
      const box = document.getElementById('error-box');
      box.textContent = errorMessages[err] || `Authentication error: ${err}`;
      box.style.display = 'block';
    }

    // Fetch auth config from server and render the right UI
    fetch('/auth/me')
      .then(r => r.json())
      .then(data => {
        const el = document.getElementById('auth-content');

        if (data.authenticated) {
          // Already logged in — redirect
          window.location.href = '/';
          return;
        }

        if (!data.oauthConfigured) {
          el.innerHTML = `
            <div class="not-configured">
              <strong>OAuth not configured</strong><br><br>
              Set these environment variables and restart:<br>
              <code>GITHUB_CLIENT_ID=your_client_id</code><br>
              <code>GITHUB_CLIENT_SECRET=your_secret</code><br><br>
              Create an OAuth App at<br>
              <a href="https://github.com/settings/developers" target="_blank" style="color:var(--accent)">
                github.com/settings/developers
              </a><br>
              Callback URL: <code>http://localhost:8095/auth/github/callback</code>
            </div>`;
          return;
        }

        el.innerHTML = `
          <a href="/auth/github" class="signin-btn">
            <svg width="20" height="20" viewBox="0 0 98 96" xmlns="http://www.w3.org/2000/svg">
              <path fill-rule="evenodd" clip-rule="evenodd" d="M48.854 0C21.839 0 0 22 0 49.217c0 21.756 13.993 40.172 33.405 46.69 2.427.49 3.316-1.059 3.316-2.362 0-1.141-.08-5.052-.08-9.127-13.59 2.934-16.42-5.867-16.42-5.867-2.184-5.704-5.42-7.17-5.42-7.17-4.448-3.015.324-3.015.324-3.015 4.934.326 7.523 5.052 7.523 5.052 4.367 7.496 11.404 5.378 14.235 4.074.404-3.178 1.699-5.378 3.074-6.6-10.839-1.141-22.243-5.378-22.243-24.283 0-5.378 1.94-9.778 5.014-13.2-.485-1.222-2.184-6.275.486-13.038 0 0 4.125-1.304 13.426 5.052a46.97 46.97 0 0 1 12.214-1.63c4.125 0 8.33.571 12.213 1.63 9.302-6.356 13.427-5.052 13.427-5.052 2.67 6.763.97 11.816.485 13.038 3.155 3.422 5.015 7.822 5.015 13.2 0 18.905-11.404 23.06-22.324 24.283 1.78 1.548 3.316 4.481 3.316 9.126 0 6.6-.08 11.897-.08 13.526 0 1.304.89 2.853 3.316 2.364 19.412-6.52 33.405-24.935 33.405-46.691C97.707 22 75.788 0 48.854 0z" fill="#fff"/>
            </svg>
            Sign in with GitHub
          </a>`;
      })
      .catch(() => {
        document.getElementById('auth-content').innerHTML =
          '<p style="text-align:center;color:var(--text-muted);font-size:0.85rem;">Could not connect to server.</p>';
      });
  </script>
</body>
</html>
