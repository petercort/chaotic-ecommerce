name: PR Smoke Test

on:
  pull_request:
    branches: [main]
    paths:
      - '*/src/**'
      - '*/package.json'

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build
        run: ./build.sh
      - name: Start services
        run: ./run.sh &
      - name: Wait
        run: sleep 70
      - name: Install k6
        run: |
          curl https://github.com/grafana/k6/releases/download/v0.52.0/k6-v0.52.0-linux-amd64.tar.gz -L | tar xvz --strip-components 1
          sudo mv k6 /usr/local/bin/k6
      - name: Install load-test dependencies and build
        working-directory: load-tests
        run: |
          npm ci
          npm run build
      - name: Smoke test
        working-directory: load-tests
        run: k6 run dist/smoke.js
