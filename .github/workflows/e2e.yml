name: E2E Tests (Playwright)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Start stack with Docker Compose
        run: docker compose up --build -d

      - name: Wait for API Gateway
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/actuator/health | grep -q '"status":"UP"'; then
              echo "API Gateway is up"
              exit 0
            fi
            echo "Waiting... ($i/30)"
            sleep 5
          done
          echo "API Gateway did not become healthy in time"
          docker compose logs
          exit 1

      - name: Wait for Demo UI
        run: |
          for i in $(seq 1 12); do
            if curl -sf http://localhost:8090/ > /dev/null; then
              echo "Demo UI is up"
              exit 0
            fi
            echo "Waiting for Demo UI... ($i/12)"
            sleep 5
          done
          echo "Demo UI did not become available in time"
          docker compose logs demo-ui
          exit 1

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        working-directory: e2e
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: e2e
        run: npx playwright test

      - name: Dump service logs on failure
        if: failure()
        run: docker compose logs

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 30
